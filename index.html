<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitHub Contribution Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e13;
    --bg2: #0f1419;
    --bg3: #161d26;
    --bg4: #1c2534;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --green: #39d353;
    --green2: #26a641;
    --cyan: #58d6f5;
    --amber: #f0c142;
    --pink: #f97bcf;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(57,211,83,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,211,83,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* HEADER */
  .header { margin-bottom: 2.5rem; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  h1 { font-family: var(--font-display); font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
  h1 span { color: var(--green); }
  .header-sub { font-size: 12px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

  /* SEARCH BOX */
  .search-box {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
  }
  .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
  .field label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .field input {
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--green); }
  .field input::placeholder { color: var(--text3); }
  .btn {
    background: var(--green);
    color: #0a0e13;
    border: none;
    border-radius: 7px;
    padding: 9px 20px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .token-note { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .token-note a { color: var(--cyan); text-decoration: none; }

  /* STATUS */
  #status { font-size: 12px; color: var(--text2); margin-bottom: 1.5rem; display: none; }
  #status.error { color: #f87171; }

  /* PROFILE CARD */
  .profile-card {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s;
  }
  .profile-card.visible { opacity: 1; transform: none; }
  .avatar { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--border2); flex-shrink: 0; }
  .profile-name { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; }
  .profile-login { font-size: 12px; color: var(--green); margin-top: 2px; }
  .profile-stats { display: flex; gap: 20px; margin-left: auto; flex-shrink: 0; }
  .pstat { text-align: right; }
  .pstat-val { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .pstat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 1px; }

  /* GRID */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
  @media(max-width:700px){ .grid2 { grid-template-columns:1fr; } }

  /* CARDS */
  .card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s;
  }
  .card.visible { opacity: 1; transform: none; }
  .card-header {
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title { font-family: var(--font-display); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); }
  .card-body { padding: 1.25rem; }
  .card-full { grid-column: 1 / -1; }

  /* LANG LIST */
  .lang-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .lang-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .lang-name { font-size: 13px; min-width: 90px; }
  .lang-bar-wrap { flex: 1; height: 5px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .lang-bar { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(.25,.8,.25,1); }
  .lang-pct { font-size: 12px; color: var(--text2); min-width: 44px; text-align: right; }

  /* REPOS TABLE */
  .repo-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .repo-table th { color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; padding: 0 8px 8px; text-align: left; font-size: 11px; }
  .repo-table td { padding: 8px 8px; border-top: 1px solid var(--border); vertical-align: middle; }
  .repo-table tr:hover td { background: var(--bg4); }
  .repo-name { color: var(--cyan); font-weight: 500; }
  .repo-lang { display: inline-flex; align-items: center; gap: 5px; }
  .star-icon { color: var(--amber); }
  .fork-icon { color: var(--text3); }
  .num { font-variant-numeric: tabular-nums; }

  /* COMMIT CHART */
  .chart-wrap { position: relative; height: 200px; }

  /* ACTIVITY GRID (heatmap style) */
  .heat-grid { display: flex; flex-direction: column; gap: 4px; }
  .heat-row { display: flex; gap: 3px; align-items: center; }
  .heat-label { font-size: 10px; color: var(--text3); min-width: 28px; }
  .heat-cell { width: 12px; height: 12px; border-radius: 2px; background: var(--bg4); transition: background 0.3s; }

  /* SKELETON */
  .skeleton { background: linear-gradient(90deg, var(--bg4) 25%, var(--bg3) 50%, var(--bg4) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 4px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* TOP LANG RING (donut) */
  .donut-wrap { position: relative; height: 200px; display: flex; align-items: center; justify-content: center; }
  .donut-center { position: absolute; text-align: center; pointer-events: none; }
  .donut-center-val { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; color: var(--text); }
  .donut-center-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-top">
      <div class="logo-dot"></div>
      <h1>GitHub <span>Analyzer</span></h1>
    </div>
    <div class="header-sub">// contribution explorer &amp; language breakdown</div>
  </div>

  <div class="search-box">
    <div class="field">
      <label>GitHub Username</label>
      <input type="text" id="username" placeholder="e.g. torvalds" />
    </div>
    <div class="field">
      <label>Personal Access Token</label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" />
      <div class="token-note">
        Needs <code>read:user</code> + <code>repo</code> scopes.
        <a href="https://github.com/settings/tokens" target="_blank">Generate one →</a>
      </div>
    </div>
    <button class="btn" id="fetch-btn" onclick="fetchData()">Analyze ↗</button>
  </div>

  <div id="status"></div>
  <div id="dashboard" style="display:none;">
    <div class="profile-card" id="profile-card">
      <img class="avatar" id="p-avatar" src="" alt="avatar"/>
      <div>
        <div class="profile-name" id="p-name"></div>
        <div class="profile-login" id="p-login"></div>
      </div>
      <div class="profile-stats">
        <div class="pstat">
          <div class="pstat-val" id="p-repos">—</div>
          <div class="pstat-label">Repos</div>
        </div>
        <div class="pstat">
          <div class="pstat-val" id="p-stars">—</div>
          <div class="pstat-label">Stars</div>
        </div>
        <div class="pstat">
          <div class="pstat-val" id="p-langs">—</div>
          <div class="pstat-label">Languages</div>
        </div>
      </div>
    </div>

    <div class="grid2">
      <!-- Language donut -->
      <div class="card" id="card-donut">
        <div class="card-header"><span class="card-title">Language breakdown</span></div>
        <div class="card-body">
          <div class="donut-wrap">
            <canvas id="donut-chart"></canvas>
            <div class="donut-center">
              <div class="donut-center-val" id="donut-center-val">—</div>
              <div class="donut-center-label">top lang</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Lang bar list -->
      <div class="card" id="card-langs">
        <div class="card-header"><span class="card-title">By byte size</span></div>
        <div class="card-body" id="lang-list"></div>
      </div>

      <!-- Stars bar chart -->
      <div class="card card-full" id="card-stars">
        <div class="card-header"><span class="card-title">Top 10 repos by stars</span></div>
        <div class="card-body">
          <div class="chart-wrap"><canvas id="stars-chart"></canvas></div>
        </div>
      </div>

      <!-- Repos table -->
      <div class="card card-full" id="card-repos">
        <div class="card-header"><span class="card-title">Repository breakdown</span></div>
        <div class="card-body">
          <div id="repo-table-wrap"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let donutInstance = null;
let starsInstance = null;

const QUERY = `
query UserStats($username: String!) {
  user(login: $username) {
    name login avatarUrl
    repositories(
      first: 100 ownerAffiliations: OWNER
      orderBy: { field: STARGAZERS, direction: DESC }
      isFork: false
    ) {
      totalCount
      nodes {
        name stargazerCount forkCount
        primaryLanguage { name color }
        languages(first: 10, orderBy: { field: SIZE, direction: DESC }) {
          edges { size node { name color } }
        }
      }
    }
  }
}`;

function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
  el.className = isErr ? 'error' : '';
}

async function fetchData() {
  const username = document.getElementById('username').value.trim();
  const token = document.getElementById('token').value.trim();
  if (!username || !token) { setStatus('⚠ Please enter both a username and token.', true); return; }

  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  btn.textContent = 'Fetching…';
  setStatus('// querying GitHub GraphQL API…', false);
  document.getElementById('dashboard').style.display = 'none';

  try {
    const res = await fetch('https://api.github.com/graphql', {
      method: 'POST',
      headers: {
        'Authorization': `bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ query: QUERY, variables: { username } })
    });

    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);

    const user = json.data.user;
    if (!user) throw new Error(`User "${username}" not found.`);

    setStatus('');
    renderDashboard(user);
  } catch (e) {
    setStatus('✖ Error: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyze ↗';
  }
}

function renderDashboard(user) {
  const repos = user.repositories.nodes;

  // Profile
  document.getElementById('p-avatar').src = user.avatarUrl;
  document.getElementById('p-name').textContent = user.name || user.login;
  document.getElementById('p-login').textContent = `@${user.login}`;
  document.getElementById('p-repos').textContent = user.repositories.totalCount;
  const totalStars = repos.reduce((s, r) => s + r.stargazerCount, 0);
  document.getElementById('p-stars').textContent = totalStars >= 1000 ? (totalStars/1000).toFixed(1)+'k' : totalStars;

  // Language breakdown
  const langBytes = {};
  const langColors = {};
  repos.forEach(r => {
    r.languages.edges.forEach(e => {
      const n = e.node.name;
      langBytes[n] = (langBytes[n]||0) + e.size;
      langColors[n] = e.node.color || '#888';
    });
  });
  const totalBytes = Object.values(langBytes).reduce((a,b)=>a+b, 0);
  const sortedLangs = Object.entries(langBytes).sort((a,b)=>b[1]-a[1]);
  document.getElementById('p-langs').textContent = sortedLangs.length;
  document.getElementById('donut-center-val').textContent = sortedLangs[0]?.[0] || '—';

  // Donut
  const top8 = sortedLangs.slice(0, 8);
  const otherBytes = sortedLangs.slice(8).reduce((s,[,b])=>s+b, 0);
  const donutLabels = top8.map(([l])=>l);
  const donutData = top8.map(([,b])=>+((b/totalBytes)*100).toFixed(2));
  const donutColors = top8.map(([l])=>langColors[l]);
  if (otherBytes > 0) { donutLabels.push('Other'); donutData.push(+((otherBytes/totalBytes)*100).toFixed(2)); donutColors.push('#484f58'); }

  if (donutInstance) donutInstance.destroy();
  const dctx = document.getElementById('donut-chart').getContext('2d');
  donutInstance = new Chart(dctx, {
    type: 'doughnut',
    data: { labels: donutLabels, datasets: [{ data: donutData, backgroundColor: donutColors, borderWidth: 2, borderColor: '#0f1419' }] },
    options: {
      cutout: '68%', plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed}%` },
        bodyFont: { family: 'JetBrains Mono', size: 12 },
        backgroundColor: '#1c2534', borderColor: '#ffffff20', borderWidth: 1
      }},
      animation: { animateRotate: true, duration: 900 }
    }
  });

  // Lang list
  const ll = document.getElementById('lang-list');
  ll.innerHTML = '';
  top8.forEach(([lang, bytes]) => {
    const pct = ((bytes/totalBytes)*100).toFixed(1);
    ll.innerHTML += `<div class="lang-item">
      <div class="lang-dot" style="background:${langColors[lang]}"></div>
      <div class="lang-name">${lang}</div>
      <div class="lang-bar-wrap"><div class="lang-bar" style="width:${pct}%;background:${langColors[lang]}"></div></div>
      <div class="lang-pct">${pct}%</div>
    </div>`;
  });

  // Stars bar chart (top 10)
  const top10 = repos.slice(0, 10);
  if (starsInstance) starsInstance.destroy();
  const sctx = document.getElementById('stars-chart').getContext('2d');
  starsInstance = new Chart(sctx, {
    type: 'bar',
    data: {
      labels: top10.map(r => r.name),
      datasets: [{
        label: 'Stars',
        data: top10.map(r => r.stargazerCount),
        backgroundColor: top10.map(r => {
          const c = r.primaryLanguage?.color || '#39d353';
          return c + 'cc';
        }),
        borderRadius: 5, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ` ⭐ ${ctx.parsed.y.toLocaleString()}` },
          bodyFont: { family: 'JetBrains Mono', size: 12 },
          backgroundColor: '#1c2534', borderColor: '#ffffff20', borderWidth: 1
        }
      },
      scales: {
        x: {
          ticks: { color: '#8b949e', font: { family: 'JetBrains Mono', size: 11 }, maxRotation: 30 },
          grid: { color: '#ffffff08' }
        },
        y: {
          ticks: { color: '#8b949e', font: { family: 'JetBrains Mono', size: 11 } },
          grid: { color: '#ffffff08' }
        }
      }
    }
  });

  // Repos table
  const wrap = document.getElementById('repo-table-wrap');
  let html = `<table class="repo-table">
    <thead><tr>
      <th>Repository</th><th>Language</th>
      <th><span class="star-icon">★</span> Stars</th>
      <th>Forks</th>
    </tr></thead><tbody>`;
  repos.slice(0, 20).forEach(r => {
    const lang = r.primaryLanguage;
    const dot = lang ? `<span class="lang-dot" style="background:${lang.color};display:inline-block"></span>` : '';
    html += `<tr>
      <td><span class="repo-name">${r.name}</span></td>
      <td><span class="repo-lang">${dot} ${lang?.name || '<span style="color:var(--text3)">—</span>'}</span></td>
      <td class="num"><span class="star-icon">★</span> ${r.stargazerCount.toLocaleString()}</td>
      <td class="num fork-icon">${r.forkCount.toLocaleString()}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;

  // Show
  document.getElementById('dashboard').style.display = 'block';
  setTimeout(()=>{
    document.getElementById('profile-card').classList.add('visible');
    ['card-donut','card-langs','card-stars','card-repos'].forEach((id,i)=>{
      setTimeout(()=>document.getElementById(id).classList.add('visible'), i*80);
    });
  }, 50);
}

document.getElementById('username').addEventListener('keydown', e => { if(e.key==='Enter') fetchData(); });
document.getElementById('token').addEventListener('keydown', e => { if(e.key==='Enter') fetchData(); });
</script>
</body>
</html>
